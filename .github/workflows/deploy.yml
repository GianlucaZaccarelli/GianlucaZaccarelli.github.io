name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update-snapshots:
        description: 'Actualize visual snapshots'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: |
          if [[ "${{ github.event.inputs.update-snapshots }}" == "true" ]]; then
            echo "Running with snapshot update..."
            npm run test:e2e -- --update-snapshots
          else
            npm run test:e2e
          fi

      - name: Commit updated snapshots
        if: github.event.inputs.update-snapshots == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual.spec.ts-snapshots/*.png
          git commit -m "chore(e2e): update visual snapshots [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload visual test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build with Astro
        run: npm run build

      - name: Generate CV PDF
        run: node scripts/generate-pdf.mjs

      - name: Copy CV to dist
        run: cp public/cv.pdf dist/cv.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
